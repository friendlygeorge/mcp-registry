name: flexprice
image: mcp/flexprice
type: server
meta:
  category: devops
  tags:
    - flexprice
    - devops
about:
  title: FlexPrice
  icon: https://avatars.githubusercontent.com/u/168305045?v=4
source:
  project: https://github.com/flexprice/mcp-server
  commit: f4f465b7a4f22a0b8763cc7b0c763031dc997147
config:
  description: Configure the connection to Redis
  secrets:
    - name: flexprice.api_key
      env: API_KEY
      example: your_api_key_here
  env:
    - name: BASE_URL
      example: https://api.cloud.flexprice.io
      value: "{{flexprice.base_url}}"
  parameters:
    type: object
    properties:
      base_url:
        type: string
